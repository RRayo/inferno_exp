<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Face Detection (Optimized)</title>
  <link rel="stylesheet" href="mediapipe.css">
</head>
<body>
  <h1>Face Detection Demo (Optimized)</h1>
  
  <div id="uiContainer"></div>
  
  <div id="liveView" class="videoView">
    <video id="webcam" autoplay playsinline></video>
    
    <div id="overlayContainer" class="overlay-container" style="display: none;">
      <div id="roiGuide" class="roi-guide"></div>
      <div id="bbox" class="highlighter"></div>
      <p id="statusText" class="status-text"></p>
      <span id="kp-0" class="key-point"></span>
      <span id="kp-1" class="key-point"></span>
      <span id="kp-2" class="key-point"></span>
      <span id="kp-3" class="key-point"></span>
      <span id="kp-4" class="key-point"></span>
      <span id="kp-5" class="key-point"></span>
    </div>
  </div>
  <canvas id="snapshotCanvas" style="display: none;"></canvas>
  <canvas id="frameCaptureCanvas" style="display: none;"></canvas>

  <script type="module" src="mediapipe.js"></script>
</body>
</html>
